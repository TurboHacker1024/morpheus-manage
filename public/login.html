<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morpheus Manage - Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/icons/morpheus-logo.png" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="card login-card">
        <div class="login-brand">
          <img class="login-brand-mark" src="/icons/morpheus-logo.png" alt="Morpheus Manage" />
          <div class="login-brand-copy">
            <p class="page-eyebrow">Morpheus Manage</p>
            <h1 class="page-title">Sign in</h1>
          </div>
        </div>

        <div class="login-meta-grid">
          <div class="login-meta-item">
            <span>Homeserver</span>
            <strong id="loginBaseUrl">Enter a homeserver</strong>
          </div>
          <div class="login-meta-item">
            <span>Password login</span>
            <strong id="loginFlowStatus">Pending</strong>
          </div>
        </div>

        <form class="form login-form" id="loginForm">
          <label>
            Homeserver
            <input
              type="text"
              id="loginHomeserver"
              placeholder="https://matrix.example.com"
              autocomplete="url"
              required
            />
          </label>
          <label>
            Matrix account
            <input
              type="text"
              id="loginUser"
              placeholder="@admin:example.com or admin"
              autocomplete="username"
              required
            />
          </label>
          <label>
            Password
            <input
              type="password"
              id="loginPassword"
              placeholder="Matrix account password"
              autocomplete="current-password"
              required
            />
          </label>
          <button class="btn primary" type="submit" id="loginSubmitBtn">Sign in</button>
        </form>

        <div class="login-fallback hidden" id="loginFallback">
          <button class="btn ghost" type="button" id="envFallbackBtn">Use fallback token</button>
          <p class="pane-note hidden" id="envFallbackNote"></p>
        </div>

        <div class="status login-status" id="loginStatus">Loading sign-in options...</div>
      </section>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
